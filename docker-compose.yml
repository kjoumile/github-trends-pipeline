services:
  postgres:
    image: postgres:15
    container_name: postgres-api
    env_file:
      - .env
    networks: [backend]
    volumes:
      - postgres_github_data:/var/lib/postgresql/data:z
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:z
    healthcheck:
      test: ['CMD-SHELL', "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  adminer:
    image: adminer:latest
    container_name: adminer
    networks: [frontend, backend]
    ports:
      - '8081:8080'
    depends_on:
      postgres:
        condition: service_healthy

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
volumes:
  postgres_github_data: