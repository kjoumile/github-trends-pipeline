x-airflow-common: &common-airflow
  image: apache/airflow:2.8.0
  networks: [backend, frontend]
  env_file:
    - .env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DB}
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'

    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags:z
    - ./logs:/opt/airflow/logs:z
    - ./plugins:/opt/airflow/plugins:z
    - ./extract:/opt/airflow/extract:z
    - ./load:/opt/airflow/load:z
    - ./jobs:/opt/airflow/jobs:z
    - ./data:/opt/airflow/data:z

services:
  airflow-init:
    <<: *common-airflow
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: bash -c "airflow db migrate && airflow users create --username ${AIRFLOW_WWW_USER_USERNAME} --password ${AIRFLOW_WWW_USER_PASSWORD} -f Admin -l Admin --role Admin --email kjoumile@gmail.com"
    restart: 'no'
  airflow-scheduler:
    <<: *common-airflow
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *common-airflow
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      airflow-scheduler:
        condition: service_started
  postgres:
    image: postgres:15
    container_name: postgres-api
    env_file:
      - .env
    networks: [backend, frontend]
    volumes:
      - postgres_github_data:/var/lib/postgresql/data:z
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:z
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  adminer:
    image: adminer:latest
    container_name: adminer
    networks: [frontend, backend]
    ports:
      - '8081:8080'
    depends_on:
      postgres:
        condition: service_healthy



networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge
volumes:
  postgres_github_data: